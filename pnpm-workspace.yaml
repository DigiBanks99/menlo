packages:
  - src/ui/web

# Disable minimum release age — Dependabot PRs target trusted packages
# (Angular, Vite, etc.) at minor/patch only, so supply-chain risk is low.
minimumReleaseAge: 0

allowBuilds:
  '@compodoc/compodoc': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true

onlyBuiltDependencies:
  - '@compodoc/compodoc'
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - sharp
  - workerd

overrides:
  ajv@>=7.0.0-alpha.0 <8.18.0: ^8.18.0
  axios@>=1.0.0 <1.15.1: ^1.15.1
  axios@>=1.0.0 <1.15.2: ^1.15.2
  brace-expansion@>=4.0.0 <5.0.6: ^5.0.6
  follow-redirects@<=1.15.11: ^1.15.12
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  uuid@<11.1.1: ^11.1.1
  uuid@>=11.0.0 <11.1.1: ^11.1.1
  webpack-dev-server@<=5.2.3: ^5.2.4
  ws@>=8.0.0 <8.20.1: ^8.20.1
  yaml@>=2.0.0 <2.8.3: ^2.8.3
